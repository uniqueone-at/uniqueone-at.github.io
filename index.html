<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniqueOne – Handgefertigte Unikate aus österreichischem Holz</title>
  <meta name="description" content="UniqueOne – Handgefertigte Unikate aus österreichischem Holz. Physisch. Digital. Limitiert." />
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --accent: #efd9b5; /* warmes Elfenbein, dezenter Kontrast zum Wordmark */
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #line-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      padding: 2rem;
      text-align: center;
      pointer-events: none;
    }

    .wordmark {
      width: min(70vw, 640px);
      height: auto;
      filter: invert(1);
      margin-bottom: 2.5rem;
      user-select: none;
    }

    .slogan {
      font-weight: 300;
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      letter-spacing: 0.08em;
      line-height: 1.6;
      max-width: 44ch;
      margin: 0;
      color: var(--fg);
    }

    .slogan .sep {
      display: inline-block;
      margin: 0 0.4em;
      opacity: 0.55;
    }

    @media (max-width: 600px) {
      .wordmark { margin-bottom: 1.75rem; }
      .slogan { letter-spacing: 0.06em; }
    }

    .legal {
      position: fixed;
      right: 1.25rem;
      bottom: 1rem;
      z-index: 2;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.55;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .legal:hover,
    .legal:focus-visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <canvas id="line-canvas" aria-hidden="true"></canvas>

  <main>
    <img class="wordmark" src="uniqueone-wordmark-black.svg" alt="UniqueOne" />
    <p class="slogan">
      Handgefertigte Unikate aus österreichischem Holz.<br />
      Physisch.<span class="sep">·</span>Digital.<span class="sep">·</span>Limitiert.
    </p>
  </main>

  <a class="legal" href="impressum.html">Impressum</a>

  <script>
    (function () {
      const canvas = document.getElementById('line-canvas');
      const ctx = canvas.getContext('2d');

      let width = 0;
      let height = 0;
      let dpr = Math.max(1, window.devicePixelRatio || 1);

      function resize() {
        dpr = Math.max(1, window.devicePixelRatio || 1);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        // initial paint to black so fade overlays look correct from the start
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);
      }
      resize();
      window.addEventListener('resize', resize);

      // Continuous, aperiodic wandering across the whole screen.
      // Sum of sines with incommensurate frequencies -> never repeats,
      // always smooth, random-feeling motion without a fixed loop.
      // Random phases are chosen once per page load so each visit differs.
      const phases = {
        x: [Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2],
        y: [Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2],
      };
      const freqs = {
        x: [0.071, 0.137, 0.233, 0.389],
        y: [0.059, 0.113, 0.211, 0.347],
      };
      const weights = [0.55, 0.28, 0.12, 0.05];

      function pointAt(t) {
        let nx = 0, ny = 0;
        for (let i = 0; i < 4; i++) {
          nx += Math.sin(freqs.x[i] * 2 * Math.PI * t + phases.x[i]) * weights[i];
          ny += Math.sin(freqs.y[i] * 2 * Math.PI * t + phases.y[i]) * weights[i];
        }
        // nx, ny are in roughly [-1, 1]. Map to the screen with a small margin
        // so the line can wander edge-to-edge without clipping the tip glow.
        const marginX = Math.min(80, width * 0.06);
        const marginY = Math.min(80, height * 0.06);
        const x = width / 2 + nx * (width / 2 - marginX);
        const y = height / 2 + ny * (height / 2 - marginY);
        return { x, y };
      }

      // Trail is a ring buffer of recent tip positions.
      const trail = [];
      const maxTrail = 260; // number of samples kept; older ones are discarded
      let lastTime = performance.now();
      let simTime = Math.random() * 1000; // random start so the motion begins mid-flight

      // Read the accent color once so CSS stays the single source of truth.
      const accent = getComputedStyle(document.documentElement)
        .getPropertyValue('--accent').trim() || '#efd9b5';
      function hexToRgb(h) {
        const m = h.replace('#', '');
        const v = m.length === 3
          ? m.split('').map(c => c + c).join('')
          : m;
        const n = parseInt(v, 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
      const ac = hexToRgb(accent);
      const rgb = ac.r + ',' + ac.g + ',' + ac.b;

      function frame(now) {
        const dt = Math.min(0.05, (now - lastTime) / 1000);
        lastTime = now;
        simTime += dt;

        // Fade previous frame toward pure black. Low alpha keeps a soft tail,
        // and because it's solid black, trailing segments eventually disappear
        // completely (no permanent residue).
        ctx.fillStyle = 'rgba(0, 0, 0, 0.085)';
        ctx.fillRect(0, 0, width, height);

        // Sample several sub-steps per frame for a silky-smooth path even on
        // slower devices.
        const subSteps = 3;
        for (let i = 0; i < subSteps; i++) {
          const t = simTime - (subSteps - 1 - i) * (dt / subSteps);
          trail.push(pointAt(t));
        }
        while (trail.length > maxTrail) trail.shift();

        if (trail.length >= 2) {
          // Draw the line as a series of short segments whose opacity and
          // width taper toward the tail. Combined with the per-frame fade,
          // this produces a head that is bright + defined and a tail that
          // vanishes smoothly.
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';

          const n = trail.length;
          for (let i = 1; i < n; i++) {
            const p0 = trail[i - 1];
            const p1 = trail[i];
            const k = i / (n - 1); // 0 at oldest, 1 at newest
            const alpha = Math.pow(k, 1.8);
            const lw = 0.6 + k * 2.2;
            ctx.strokeStyle = 'rgba(' + rgb + ',' + alpha.toFixed(3) + ')';
            ctx.lineWidth = lw;
            ctx.beginPath();
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.stroke();
          }

          // Glowing dot at the very tip
          const tip = trail[n - 1];
          const glowR = 8;
          const grad = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, glowR);
          grad.addColorStop(0, 'rgba(' + rgb + ',0.9)');
          grad.addColorStop(0.4, 'rgba(' + rgb + ',0.3)');
          grad.addColorStop(1, 'rgba(' + rgb + ',0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(tip.x, tip.y, glowR, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = accent;
          ctx.beginPath();
          ctx.arc(tip.x, tip.y, 1.6, 0, Math.PI * 2);
          ctx.fill();
        }

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(function (t) {
        lastTime = t;
        frame(t);
      });
    })();
  </script>
</body>
</html>
